<!DOCTYPE html>
<html lang="zh-TW">
<head>
<!-- ⚠️ 2026-07-21 移除：原本這裡有一段「裝置門禁」的前端 JavaScript，
     只要偵測到不是觸控裝置（滑鼠、鍵盤操作），就會立刻把畫面導去空白頁。
     這段會不分青紅皂白地把「任何用滑鼠操作的裝置」都踢出去——包括用
     滑鼠、鍵盤操作的 Windows Kiosk 電腦。這個門禁功能現在已經被
     _worker.js（伺服器端、更早一層、更難繞過）取代，這裡留著只會多一層
     「連自己人都會被誤殺」的風險，故移除。 -->
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>咱的台雞店・後台管理</title>

<!-- ★ 2026-07-21 新增：「加到主畫面」之後能變成真正全螢幕（沒有網址列）的
     App 模式，要靠這幾個 meta 標籤（iOS 用）+ manifest.json（Android 用）
     一起設定，光靠 CSS 沒辦法藏掉瀏覽器自己的網址列。 -->
<link rel="manifest" href="/admin-manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="台雞店後台">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a3a5c">

<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Microsoft JhengHei','Segoe UI',Arial,sans-serif; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; background:#eef2f7; }
    body {
        display:flex; flex-direction:column;
        /* ★ 全螢幕 App 感：禁止選取文字、禁止長按選單、禁止整頁彈跳捲動，
           讓後台看起來不像一般網頁，比較像獨立的管理 App */
        user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
        touch-action:pan-x pan-y; overflow:hidden;
    }

    .login-card {
        max-width:340px; margin:auto; background:#fff; border-radius:20px;
        box-shadow:0 15px 30px rgba(0,0,0,.1); padding:32px 24px; text-align:center;
    }
    .login-card input {
        width:100%; padding:14px 15px; border:2px solid #e2e8f0; border-radius:10px;
        font-size:16px; margin:16px 0; text-align:center;
    }
    .btn-primary { border:none; border-radius:10px; font-weight:700; cursor:pointer; background:#1a3a5c; color:#fff; padding:14px 20px; width:100%; font-size:15px; }
    .btn-primary:disabled { opacity:.6; cursor:default; }
    .error-text { color:#dc2626; font-size:13px; min-height:18px; }

    #loginScreen { flex:1; display:flex; }
    #appScreen { display:none; flex:1; flex-direction:column; min-height:0; }

    header.hub-header {
        background:#1a3a5c; color:#fff; padding:12px 16px;
        display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
    }
    header.hub-header h1 { font-size:17px; font-weight:900; }

    .tool-frame-wrap { flex:1; position:relative; min-height:0; background:#fff; }
    .tool-frame-wrap iframe {
        position:absolute; inset:0; width:100%; height:100%; border:none; display:none;
    }
    .tool-frame-wrap iframe.active { display:block; }
    .tool-loading {
        position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
        color:#64748b; font-size:14px; background:#fff;
    }

    /* ★ 基本版只有兩個功能，用最單純的頂部分頁就好，不做側邊欄、不做隱藏
       機制——初期給小吃店老闆用，簡單、一眼看懂最重要。 */
    nav.top-tabs {
        display:flex; background:#fff; border-bottom:1px solid #e2e8f0; flex-shrink:0;
    }
    nav.top-tabs button {
        flex:1; background:none; border:none; padding:12px 4px; font-size:14px;
        font-weight:700; color:#64748b; border-bottom:3px solid transparent;
    }
    nav.top-tabs button.active { color:#1a3a5c; border-bottom-color:#1a3a5c; }
</style>
</head>
<body>
    <!-- ★ 2026-07-21 新增：版本號標籤，固定在左上角，每次交付新版本時這串文字
         都會換，方便肉眼確認手機上載到的是不是最新版本，不用再靠猜的。 -->
    <div style="position:fixed;top:6px;left:6px;font-size:10px;font-weight:700;color:rgba(255,255,255,.9);background:rgba(0,0,0,.45);padding:3px 8px;border-radius:6px;z-index:100000;pointer-events:none;white-space:nowrap;">
        admin-v21-2026-07-22-device-restriction-toggle
    </div>

<!-- ★ 2026-07-21 新增：LINE 身份白名單檢查畫面。只有透過 LIFF 連結（在 LINE
     App 裡開啟）進來時才會做這關檢查；如果是從一般瀏覽器/桌面圖示直接開，
     liff.isInClient() 會是 false，直接跳過這關、走原本的密碼登入，
     不會把「還沒設定 LIFF」的自己鎖在外面。 -->
<div id="liffCheckScreen" style="flex:1; display:flex; align-items:center; justify-content:center; text-align:center; padding:20px;">
    <div>
        <div style="font-size:36px;margin-bottom:10px;" id="liffCheckIcon">🔒</div>
        <div id="liffCheckText" style="color:#64748b;font-size:14px;">身份驗證中...</div>
    </div>
</div>

<div id="loginScreen" style="display:none;">
    <div class="login-card">
        <div style="font-size:40px;margin-bottom:10px;">🍗</div>
        <h2 style="margin-bottom:6px;">咱的台雞店・後台管理</h2>
        <p style="color:#64748b;font-size:13px;">登入一次，訂單看板跟菜單編輯都能直接用</p>
        <input type="password" id="passwordInput" placeholder="管理密碼" autocomplete="off">
        <button class="btn-primary" id="loginBtn" onclick="handleLoginClick()">登入</button>
        <div class="error-text" id="loginError"></div>
    </div>
</div>

<div id="appScreen">
    <header class="hub-header">
        <h1 id="pageTitle">📋 訂單看板</h1>
    </header>

    <nav class="top-tabs">
        <button class="active" data-tool="orders" onclick="switchTool('orders')">📋 訂單看板</button>
        <button data-tool="menu" onclick="switchTool('menu')">🍗 菜單編輯</button>
        <button data-tool="purchase" onclick="switchTool('purchase')">📦 每日進貨</button>
    </nav>

    <div class="tool-frame-wrap" id="frameWrap"></div>
</div>

        }

        // 根本不用呼叫 liff.init()——呼叫了也一定會走到下面 showLoginScreen()
        // 這條路，但過程中 LIFF SDK 會在主控台印出「目前網址跟登記的 Endpoint
        // 網址不符」這種警告（因為 Cloudflare 內部把 /admin 轉成
        // /admin_hub_basic 這個實際檔名，跟 LINE 開發者後台登記的網址對不
        // 起來）。這個警告本身無害，但既然不是 LINE 環境、這個檢查本來就
        // 用不到，乾脆完全跳過，連呼叫都不呼叫，警告自然不會出現。
        if (!/\bLine\//i.test(navigator.userAgent || '')) {
            showLoginScreen();
            return;
        }
        try {
            await liff.init({ liffId: ADMIN_LIFF_ID });
            // 不是從 LINE App 裡開啟（例如從瀏覽器書籤、加到主畫面的圖示直接開），
            // 跳過這關白名單檢查，走原本的密碼登入，避免把自己鎖在外面
            if (!liff.isInClient()) {
                showLoginScreen();
                return;
            }
            if (!liff.isLoggedIn()) {
                liff.login();
                return; // login() 會導頁，這裡先不用做別的事
            }
            const idToken = liff.getIDToken();
            verifiedIdToken = idToken || '';
            const resp = await fetch(`${WEB_APP_URL}?action=verifyAdminLineId&idToken=${encodeURIComponent(idToken || '')}`);
            const data = await resp.json();
            if (data.status === 'success' && data.allowed) {
                window.adminRole = data.role || 'owner'; // ★ 2026-07-22 新增：記錄角色，登入成功後用來決定要不要藏起敏感分頁
                try {
                    const profile = await liff.getProfile();
                    operatorName = profile.displayName || '';
                } catch (profileErr) {
                    console.warn('[操作紀錄] 取得顯示名稱失敗，不影響登入：', profileErr.message);
                }
                showLoginScreen();
            } else {
                showLiffBlocked('此 LINE 帳號沒有後台權限，請聯絡管理員');
            }
        } catch (err) {
            // LIFF 初始化或驗證過程出錯，保守放行到密碼登入，不要因為這層
            // 附加檢查故障就讓正常密碼登入也連帶用不了
            console.warn('[LIFF 後台白名單檢查] 失敗，改走密碼登入：', err.message);
            showLoginScreen();
        }
    }
    runLiffAdminCheck();

    const TOOL_TITLES = { orders: '📋 訂單看板', menu: '🍗 菜單編輯', purchase: '📦 每日進貨' };

    let verifiedPassword = '';
    let currentTool = 'orders';
    const loadedFrames = {};

    function b64DecodeUtf8(b64) {
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return new TextDecoder('utf-8').decode(bytes);
    }

    function getToolHtml(toolKey) {
        const blobs = JSON.parse(document.getElementById('tool-blobs').textContent);
        let html = b64DecodeUtf8(blobs[toolKey]);
        html = html.split('%%PW%%').join(verifiedPassword);
        // ★ 2026-07-21 新增：操作紀錄用，把登入者的 LINE 顯示名稱一起注入，
        // 工具頁面存資料時可以順手帶上這個名字，後端記進操作紀錄。
        html = html.split('%%OPERATOR%%').join((operatorName || '').replace(/'/g, "\\'"));
        // ★ 2026-07-22 新增：員工帳號分權限，把角色也一起注入，工具頁面
        // 自己決定要不要藏起敏感功能（例如staff角色藏起系統設定分頁）
        html = html.split('%%ROLE%%').join(window.adminRole || 'owner');
        return html;
    }

    // ★ 2026-07-21 新增：全螢幕（Fullscreen API），跟 LIFF 有沒有設定成
    // Size=Full 是兩件事、兩層各自獨立的防護，這裡是瀏覽器層級隱藏頂部
    // 標題列。限制要先講清楚：
    //   - 一定要在「使用者點擊」的當下同步呼叫才會生效，不能等 fetch 密碼
    //     驗證這種非同步動作跑完才呼叫，所以獨立寫一個 handleLoginClick()，
    //     在按鈕 onclick 裡第一時間呼叫，不要跟在 async tryLogin() 內部。
    //   - iOS（包含 LINE 內建瀏覽器）系統性不支援 Fullscreen API，這條路
    //     在 iPhone 上一定會靜默失敗，這是正常現象，不是設定錯誤。
    function getFullscreenRequestFn(el) {
        return el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen || null;
    }
    function isCurrentlyFullscreen() {
        return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
    }
    function handleLoginClick() {
        if (!isCurrentlyFullscreen()) {
            const reqFn = getFullscreenRequestFn(document.documentElement);
            if (reqFn) {
                try { reqFn.call(document.documentElement).catch(() => {}); } catch (e) {}
            }
        }
        tryLogin();
    }

    async function tryLogin() {
        const pw = document.getElementById('passwordInput').value.trim();
        const errEl = document.getElementById('loginError');
        const btnEl = document.getElementById('loginBtn');
        errEl.textContent = '';
        if (!pw) { errEl.textContent = '請輸入密碼'; return; }

        btnEl.disabled = true; btnEl.textContent = '登入中...';
        try {
            const resp = await fetch(`${WEB_APP_URL}?action=getOrders&password=${encodeURIComponent(pw)}&idToken=${encodeURIComponent(verifiedIdToken)}`);
            const data = await resp.json();
            if (data.status !== 'success') {
                errEl.textContent = data.message || '登入失敗，請確認密碼';
                return;
            }
        } catch (err) {
            errEl.textContent = '無法連線：' + err.message;
            return;
        } finally {
            btnEl.disabled = false; btnEl.textContent = '登入';
        }

        verifiedPassword = pw;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'flex';
        // ★ 2026-07-22 新增：員工帳號分權限——staff角色藏起「菜單編輯」這個
        // 比較敏感、容易改壞事情（改價格）的分頁，只留訂單、進貨這些日常操作
        if (window.adminRole === 'staff') {
            const menuTabBtn = document.querySelector('nav.top-tabs button[data-tool="menu"]');
            if (menuTabBtn) menuTabBtn.style.display = 'none';
        }
        switchTool('orders');
        setupFullscreenExitWatcher();
    }

    // ★ 2026-07-21 新增：登入後只要退出全螢幕（不管什麼原因——左右滑動、
    // 上下滑動過猛、通知欄下拉、螢幕旋轉…），就強制退回登入畫面，要求
    // 重新輸入密碼才能再進去。做法直接參考客人點餐頁面同一套邏輯：判斷
    // 依據是「現在還是不是全螢幕」這個結果，不用一個一個去猜是哪個手勢
    // 造成的。清空已驗證的密碼跟已注入的工具頁面，避免退回登入畫面後，
    // 資料還殘留在記憶體裡可以被繞過。
    let fullscreenWatcherActive = false;
    let fullscreenPollTimer = null;
    let fullscreenWatcherPaused = false; // ★ 保留當第二層保險，不是主要防線了
    // ★ 2026-07-22 重大修正：原本「一偵測到不是全螢幕，馬上踢出去」，
    // 靠 postMessage 在跳出照片選擇器這種原生視窗前後「喊暫停/喊恢復」
    // 來閃過——但這個做法，時機要抓得很準：iframe 通知父頁面「要暫停了」
    // 這個訊息，本身也需要經過瀏覽器事件循環才會真的送達，跟「原生視窗
    // 跳出來、瞬間讓畫面脫離全螢幕」這兩件事，誰先誰後不保證，實際測試
    // 下來還是會被誤判、把使用者踢出去。
    // 改成更直接、不依賴跨視窗訊息時機的做法：「不是全螢幕」這件事，
    // 要連續偵測到好幾次（下面 REQUIRED_MISS_COUNT 次，每次間隔1.5秒，
    // 等於要連續脫離全螢幕超過幾秒鐘）才真的觸發登出；只要中間任何一次
    // 偵測到「又是全螢幕了」，這個計數就重新歸零。這樣像跳出照片選擇器
    // 這種「短暫離開、很快就回來」的操作，不會被誤判，但真的長時間離開
    // 全螢幕（例如故意切出去、縮小視窗），還是會被抓到、正常登出。
    const REQUIRED_MISS_COUNT = 4; // 4次 x 1.5秒 = 至少連續6秒不是全螢幕，才會被踢
    let consecutiveMissCount = 0;
    function handleAdminFullscreenChange() {
        if (!fullscreenWatcherActive) return;
        if (fullscreenWatcherPaused) return; // 保留當額外保險
        if (isCurrentlyFullscreen()) {
            consecutiveMissCount = 0; // 又偵測到全螢幕了，重新歸零
            return;
        }
        consecutiveMissCount++;
        if (consecutiveMissCount >= REQUIRED_MISS_COUNT) {
            forceReturnToLogin();
        }
    }
    // ★ 選檔案這類會跳出「作業系統原生視窗」的操作，跟跳出彈窗確認一樣，
    // 會讓畫面暫時脫離全螢幕狀態——上面的「連續偵測」機制是主要防線，
    // 這裡的暫停/恢復當作額外的第二層保險，兩層一起用，不衝突。
    // ★ 2026-07-22 新增：手機瀏覽器（尤其LINE的LIFF內建瀏覽器）在跳出
    // 「選照片」這種畫面時，會把咱們的網頁整個切到背景——背景狀態下，
    // 瀏覽器對setInterval這類計時器的執行頻率不保證準時（可能被節流、
    // 暫停，回到前景時又一次補跑好幾次），單純靠「連續偵測N次」在手機
    // 上不夠可靠，會出現使用者感覺「馬上」就被踢的情況。改用瀏覽器
    // 「頁面可見度」這個事件來源當作更準確的判斷依據：這個事件無論在
    // 電腦或手機、無論是原生視窗或APP切換，都會確實觸發，不受計時器
    // 節流影響。頁面一被切到背景，立刻暫停監控；切回前景後，先等一點
    // 時間讓畫面穩定，再恢復監控、並把計數重新歸零。
    // ★ 2026-07-22 新增：手機瀏覽器（尤其LINE的LIFF內建瀏覽器）在跳出
    // 「選照片」這種畫面時，會把咱們的網頁整個切到背景——背景狀態下，
    // 瀏覽器對setInterval這類計時器的執行頻率不保證準時（可能被節流、
    // 暫停，回到前景時又一次補跑好幾次），單純靠「連續偵測N次」在手機
    // 上不夠可靠，會出現使用者感覺「馬上」就被踢的情況。改用瀏覽器
    // 「頁面可見度」這個事件來源當作更準確的判斷依據：這個事件無論在
    // 電腦或手機、無論是原生視窗或APP切換，都會確實觸發，不受計時器
    // 節流影響。頁面一被切到背景，立刻暫停監控；切回前景後，先等一點
    // 時間讓畫面穩定，再恢復監控、並把計數重新歸零。
    let fullscreenWatcherPauseTimeout = null;
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            fullscreenWatcherPaused = true;
            consecutiveMissCount = 0;
            if (fullscreenWatcherPauseTimeout) clearTimeout(fullscreenWatcherPauseTimeout);
        } else {
            if (fullscreenWatcherPauseTimeout) clearTimeout(fullscreenWatcherPauseTimeout);
            fullscreenWatcherPauseTimeout = setTimeout(() => {
                // ★ 同樣道理：切回前景時，全螢幕狀態可能已經退出了，
                // 先嘗試重新申請一次，理由見下面message監聽器裡的說明
                if (!isCurrentlyFullscreen()) {
                    const reqFn = getFullscreenRequestFn(document.documentElement);
                    if (reqFn) {
                        try { reqFn.call(document.documentElement).catch(() => {}); } catch (e) {}
                    }
                }
                setTimeout(() => {
                    fullscreenWatcherPaused = false;
                    consecutiveMissCount = 0;
                }, 500);
            }, 1500);
        }
    });

    window.addEventListener('message', (event) => {
        if (event.data === 'pause-fullscreen-watcher') {
            fullscreenWatcherPaused = true;
            consecutiveMissCount = 0; // 暫停時順便歸零，恢復監控時從頭算
            if (fullscreenWatcherPauseTimeout) clearTimeout(fullscreenWatcherPauseTimeout);
            fullscreenWatcherPauseTimeout = setTimeout(() => { fullscreenWatcherPaused = false; }, 30000);
        } else if (event.data === 'resume-fullscreen-watcher') {
            // ★ 2026-07-22 重大修正：跳出照片選擇器這種原生視窗之後，
            // 全螢幕狀態很可能已經「整個退出」了，不會自己恢復——瀏覽器
            // 的全螢幕API規則是「退出了就是退出了」，要有人主動重新
            // requestFullscreen() 才會再進去，不是選擇器一關閉就自動
            // 恢復。原本這裡只是把監控恢復運作，但全螢幕根本沒有真的
            // 回來，等於監控一啟動、馬上又偵測到「不是全螢幕」，拖了
            // 幾秒（安全逾時+連續偵測次數）之後還是被踢。現在改成：
            // 先嘗試重新申請一次全螢幕，等一小段時間讓它有機會生效，
            // 才真的恢復監控。
            if (!isCurrentlyFullscreen()) {
                const reqFn = getFullscreenRequestFn(document.documentElement);
                if (reqFn) {
                    try { reqFn.call(document.documentElement).catch(() => {}); } catch (e) {}
                }
            }
            setTimeout(() => {
                fullscreenWatcherPaused = false;
                consecutiveMissCount = 0;
            }, 500);
            if (fullscreenWatcherPauseTimeout) { clearTimeout(fullscreenWatcherPauseTimeout); fullscreenWatcherPauseTimeout = null; }
        }
    });
    function setupFullscreenExitWatcher() {
        if (fullscreenWatcherActive) return;
        // ★ 2026-07-22 重大bug修正：原本這裡不管全螢幕請求有沒有真的成功，
        // 一律直接開始監控——如果這台裝置/瀏覽器環境，全螢幕API請求失敗
        // 或不支援（例如某些桌面瀏覽器環境、或使用者的瀏覽器設定擋掉了），
        // 監控機制會在1.5秒內偵測到「現在不是全螢幕」，直接把使用者踢出去，
        // 不管有沒有做任何操作，登入後很快就會被踢，整個後台變得不能用。
        // 現在改成：先給瀏覽器一點時間讓全螢幕請求真的生效（非同步的，
        // 呼叫完不會馬上生效），過1秒後才檢查一次「現在真的是全螢幕了嗎」，
        // 真的是全螢幕才啟動監控；如果這台裝置/瀏覽器就是沒辦法達成全螢幕，
        // 就不啟動這層監控，讓使用者至少能正常使用後台（犧牲這一層防護，
        // 換取工具本身能用，這個取捨比「登入後馬上被踢、完全不能用」合理）。
        setTimeout(() => {
            if (!isCurrentlyFullscreen()) {
                console.warn('[全螢幕監控] 這個環境沒有成功進入全螢幕，跳過啟動監控機制，讓後台至少能正常使用');
                return;
            }
            fullscreenWatcherActive = true;
            ['fullscreenchange', 'webkitfullscreenchange', 'msfullscreenchange'].forEach(evt => {
                document.addEventListener(evt, handleAdminFullscreenChange);
            });
            // ★ 2026-07-21 新增：備援機制。fullscreenchange 事件在部分內建瀏覽器
            // 環境（例如 LINE 的 LIFF 瀏覽器）不一定可靠觸發，光靠事件監聽可能
            // 漏掉「已經退出全螢幕」這件事。改成同時每 1.5 秒主動輪詢一次目前
            // 是不是全螢幕狀態，不管事件有沒有觸發，最多 1.5 秒內一定會被抓到。
            if (fullscreenPollTimer) clearInterval(fullscreenPollTimer);
            fullscreenPollTimer = setInterval(handleAdminFullscreenChange, 1500);
        }, 1000);
    }
    function forceReturnToLogin() {
        fullscreenWatcherActive = false;
        if (fullscreenPollTimer) { clearInterval(fullscreenPollTimer); fullscreenPollTimer = null; }
        verifiedPassword = '';
        document.getElementById('appScreen').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        const pwInput = document.getElementById('passwordInput');
        if (pwInput) pwInput.value = '';
        // 已經注入密碼的工具 iframe 也要清掉，避免退回登入畫面後，
        // 背景還留著能操作資料的舊 iframe
        const frameWrap = document.getElementById('frameWrap');
        if (frameWrap) frameWrap.innerHTML = '';
        Object.keys(loadedFrames).forEach(key => delete loadedFrames[key]);
    }

    function switchTool(toolKey) {
        currentTool = toolKey;
        document.getElementById('pageTitle').textContent = TOOL_TITLES[toolKey] || toolKey;
        document.querySelectorAll('nav.top-tabs button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.tool === toolKey);
        });

        // ★ 2026-07-22 重大簡化：原本試著在「跳出照片選擇器前後」精準抓
        // 暫停/恢復的時機，中間牽涉太多不確定因素（手機瀏覽器背景切換
        // 的行為、全螢幕狀態退出後不會自動恢復……），修了好幾輪還是不
        // 夠穩定。改成更直接的做法：只要停留在「菜單編輯」這個分頁，
        // 整個監控機制都關閉，不管在裡面點幾次、點多快都不會被誤判；
        // 離開這個分頁、切到別的工具，才重新把監控打開。這個分頁本來
        // 就是會用到「選照片」這種原生視窗的地方，乾脆整段時間都不用
        // 這層防護，換取操作穩定、好用。
        if (toolKey === 'menu') {
            try { fullscreenWatcherPaused = true; if (fullscreenWatcherPauseTimeout) { clearTimeout(fullscreenWatcherPauseTimeout); fullscreenWatcherPauseTimeout = null; } } catch (e) {}
        } else {
            try {
                fullscreenWatcherPaused = false;
                consecutiveMissCount = 0;
                if (!isCurrentlyFullscreen()) {
                    const reqFn = getFullscreenRequestFn(document.documentElement);
                    if (reqFn) { try { reqFn.call(document.documentElement).catch(() => {}); } catch (e2) {} }
                }
            } catch (e) {}
        }

        const wrap = document.getElementById('frameWrap');
        Object.keys(loadedFrames).forEach(key => {
            loadedFrames[key].classList.toggle('active', key === toolKey);
        });
        if (loadedFrames[toolKey]) return;

        const loadingEl = document.createElement('div');
        loadingEl.className = 'tool-loading';
        loadingEl.textContent = '載入中...';
        wrap.appendChild(loadingEl);

        const iframe = document.createElement('iframe');
        iframe.className = 'active';
        wrap.appendChild(iframe);
        loadedFrames[toolKey] = iframe;
        iframe.addEventListener('load', () => loadingEl.remove(), { once: true });
        iframe.srcdoc = getToolHtml(toolKey);
    }

    document.getElementById('passwordInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLoginClick();
    });
</script>
</body>
</html>
