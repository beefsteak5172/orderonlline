name = "orderonlline"  # ✅ 改成跟你 Cloudflare 上已經建立的 Worker 同名（截圖看到的專案名稱）
compatibility_date = "2026-07-23"
main = "_worker.js"

[assets]
directory = "."
binding = "ASSETS"
not_found_handling = "single-page-application"

# ⚠️ 2026-07-21：原本用 Cloudflare Dashboard 的 Secret 設定，但遇到 Cloudflare
# 官方已知的 bug——用 GitHub 自動部署時，每次 push 都會把 Dashboard 手動設定的
# Secret 清空。改成直接寫在這裡（[vars]，明文）解決反覆消失的問題。
# 取捨：這組網址會出現在 GitHub repo 裡，但因為是私人 repo、且這組網址本身
# 沒有密碼也進不去任何資料（後台要密碼、客人點餐要 LINE 身份驗證），
# 風險可以接受，換來的是不會再每次部署就打不開。
[vars]
GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw0u13ZHi5WxuxIYqLLtRMyJVtK8NsMBLT5fAjgF2itUg_Qq9byoiiYgcFSHJYB8iRk/exec"  # ✅ 已換成你提供的無名牛排測試部署網址
# ★ 2026-07-21 新增：限流改用已驗證的 LINE 身份時，Worker 要拿這個去跟
# LINE 官方驗證 idToken 是不是核發給這個 LIFF 的。這不是機密資訊
# （跟客人/後台LIFF頁面原始碼裡本來就看得到的Channel ID一樣，公開也沒關係），
# 放在明文 [vars] 沒問題。
LINE_CHANNEL_ID = "請填入無名牛排專用LINE官方帳號的LIFF_Channel_ID"  # ⚠️ 要在LINE Developers另外建一個給無名牛排用的Channel，不能沿用台雞店的
# ★ 2026-07-21 新增：後台改用 Windows kiosk 電腦時的例外通道金鑰，網址
# 要帶 ?kioskKey=這組值 才能跳過手機/LINE檢查。這組值不能外流，外流等於
# 任何電腦都能繞過裝置門禁直接進後台密碼畫面（密碼本身還是要對才能真的
# 登入，這條路只是繞過「一定要手機/LINE」這關，不是繞過密碼）。
ADMIN_KIOSK_KEY = "-H8lFkMdk2Kwmg9k8wD-0UWcQnDRtL6J-kxrWALY0mk"  # 這是全新產生的專屬金鑰，只給無名牛排這套系統用

# ⚠️ 2026-07-23 暫時拿掉：KV binding 原本填的是中文提示文字，不是真的
# namespace ID，Cloudflare 部署時會直接建置失敗（這就是截圖看到
# "Latest build failed" 的主因）。KV 只用來做後台密碼登入的失敗次數限流，
# 不影響點餐/送單等主要功能，先整段拿掉讓部署能跑起來；等你在 Cloudflare
# Dashboard 建好 KV namespace、把下面這段取消註解、換成真實 ID 後，
# 再重新部署即可恢復這個限流保護。
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "換成你在Cloudflare新建的KV namespace ID"
